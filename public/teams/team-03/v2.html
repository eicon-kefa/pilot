<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="내 위치 주변 체육시설의 운영 시간, 혼잡도, 코트 상태를 함께 공유하는 학생용 체육시설 지도 웹앱"
    />
    <title>코트체크 | 내 주변 체육시설 지도</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      crossorigin=""
      onerror="this.href='https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css'"
    />
    <style>
      :root {
        color-scheme: light;
        --bg: #f5f1e8;
        --paper: #fffdf8;
        --ink: #1f251f;
        --muted: #687164;
        --line: #ded7c8;
        --green: #2d7652;
        --green-dark: #1f593d;
        --blue: #2b6d98;
        --amber: #e8b650;
        --red: #c74e3f;
        --clay: #b56545;
        --shadow: 0 20px 50px rgba(53, 45, 31, 0.15);
        --radius: 8px;
        --s1: clamp(0.5rem, 0.43rem + 0.34vw, 0.72rem);
        --s2: clamp(0.75rem, 0.62rem + 0.65vw, 1.12rem);
        --s3: clamp(1rem, 0.78rem + 1.05vw, 1.65rem);
        --s4: clamp(1.45rem, 0.95rem + 2.45vw, 2.8rem);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          "Noto Sans KR", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100dvh;
        background:
          linear-gradient(120deg, rgba(45, 118, 82, 0.1), transparent 42%),
          linear-gradient(260deg, rgba(43, 109, 152, 0.1), transparent 45%),
          var(--bg);
        color: var(--ink);
      }

      button,
      input,
      select,
      textarea {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      button:focus-visible,
      input:focus-visible,
      select:focus-visible,
      textarea:focus-visible {
        outline: 3px solid rgba(43, 109, 152, 0.45);
        outline-offset: 3px;
      }

      h1,
      h2,
      h3,
      p {
        margin: 0;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        border: 0;
      }

      .topbar {
        position: sticky;
        top: 0;
        z-index: 500;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: var(--s2);
        padding: calc(0.72rem + env(safe-area-inset-top)) var(--s3) 0.72rem;
        border-bottom: 1px solid rgba(222, 215, 200, 0.84);
        background: rgba(245, 241, 232, 0.9);
        backdrop-filter: blur(16px);
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 0.72rem;
        min-height: 44px;
        color: inherit;
        text-decoration: none;
      }

      .brand-mark {
        display: grid;
        place-items: center;
        width: 38px;
        height: 38px;
        border-radius: 8px;
        color: white;
        background: var(--green);
        font-weight: 950;
        box-shadow: 0 10px 24px rgba(45, 118, 82, 0.28);
      }

      .brand strong,
      .brand small {
        display: block;
      }

      .brand strong {
        line-height: 1;
        font-size: clamp(1rem, 0.9rem + 0.42vw, 1.18rem);
      }

      .brand small {
        margin-top: 0.22rem;
        color: var(--muted);
        font-size: 0.78rem;
      }

      .top-actions {
        display: flex;
        gap: 0.5rem;
      }

      .icon-btn,
      .text-btn,
      .chip,
      .primary-btn,
      .secondary-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.45rem;
        min-width: 44px;
        min-height: 44px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        color: var(--ink);
        background: rgba(255, 253, 248, 0.9);
        transition:
          transform 160ms ease,
          background 160ms ease,
          border-color 160ms ease,
          box-shadow 160ms ease;
      }

      .icon-btn:hover,
      .text-btn:hover,
      .chip:hover,
      .secondary-btn:hover {
        transform: translateY(-1px);
        border-color: rgba(45, 118, 82, 0.45);
        box-shadow: 0 9px 20px rgba(53, 45, 31, 0.1);
      }

      .icon {
        width: 1.05rem;
        height: 1.05rem;
        flex: 0 0 auto;
      }

      .category-screen {
        display: grid;
        gap: var(--s4);
        width: min(1160px, 100%);
        margin: 0 auto;
        padding: var(--s4) var(--s3);
      }

      .intro {
        display: grid;
        gap: var(--s2);
        max-width: 830px;
      }

      .eyebrow {
        color: var(--green-dark);
        font-size: 0.78rem;
        font-weight: 850;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      h1 {
        max-width: 12.4ch;
        font-size: clamp(2.5rem, 1.45rem + 5.2vw, 5.3rem);
        line-height: 0.96;
        letter-spacing: 0;
      }

      .intro p:not(.eyebrow) {
        max-width: 62ch;
        color: var(--muted);
        font-size: clamp(1rem, 0.9rem + 0.46vw, 1.2rem);
        line-height: 1.56;
      }

      .location-strip {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 0.55rem;
        color: #3f4b41;
      }

      .location-pill {
        display: inline-flex;
        align-items: center;
        gap: 0.45rem;
        min-height: 38px;
        padding: 0 0.72rem;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: rgba(255, 253, 248, 0.8);
        font-size: 0.9rem;
        font-weight: 760;
      }

      .category-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(min(100%, 230px), 1fr));
        gap: var(--s2);
      }

      .category-card {
        display: grid;
        align-content: space-between;
        min-height: 174px;
        gap: var(--s2);
        padding: var(--s3);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--paper);
        color: var(--ink);
        text-align: left;
        box-shadow: 0 13px 30px rgba(53, 45, 31, 0.08);
      }

      .category-card:hover {
        transform: translateY(-3px);
        border-color: var(--green);
      }

      .category-icon {
        display: grid;
        place-items: center;
        width: 52px;
        height: 52px;
        border-radius: 8px;
        color: white;
        background: var(--green);
      }

      .category-card:nth-child(2n) .category-icon {
        background: var(--blue);
      }

      .category-card:nth-child(3n) .category-icon {
        background: var(--clay);
      }

      .category-card h2 {
        font-size: 1.35rem;
      }

      .category-card p {
        margin-top: 0.35rem;
        color: var(--muted);
        line-height: 1.45;
      }

      .map-screen {
        display: grid;
        grid-template-areas:
          "map"
          "sidebar"
          "detail";
        gap: var(--s2);
        padding: var(--s2);
      }

      .sidebar,
      .detail-panel {
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: rgba(255, 253, 248, 0.94);
        box-shadow: var(--shadow);
      }

      .sidebar {
        grid-area: sidebar;
        display: grid;
        gap: var(--s2);
        padding: var(--s2);
      }

      .sidebar-head {
        display: grid;
        gap: var(--s2);
      }

      .sidebar h2 {
        font-size: clamp(1.55rem, 1.15rem + 1.45vw, 2.25rem);
      }

      .back-btn {
        justify-self: start;
        padding: 0 0.8rem;
      }

      .search-box {
        display: grid;
        grid-template-columns: 1.15rem 1fr;
        align-items: center;
        gap: 0.62rem;
        min-height: 48px;
        padding: 0 0.85rem;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: white;
      }

      .search-box svg {
        color: var(--muted);
      }

      .search-box input {
        min-width: 0;
        border: 0;
        outline: 0;
        background: transparent;
      }

      .filter-row {
        display: flex;
        gap: 0.5rem;
        overflow-x: auto;
        padding-bottom: 0.2rem;
      }

      .chip {
        flex: 0 0 auto;
        min-height: 40px;
        padding: 0 0.8rem;
        font-size: 0.9rem;
      }

      .chip.active {
        color: white;
        background: var(--green);
        border-color: var(--green);
      }

      .facility-list,
      .feed {
        display: grid;
        gap: 0.65rem;
      }

      .facility-list {
        max-height: 430px;
        overflow: auto;
      }

      .facility-card {
        display: grid;
        gap: 0.65rem;
        padding: 0.92rem;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: white;
        color: inherit;
        text-align: left;
      }

      .facility-card.selected {
        border-color: var(--green);
        box-shadow: inset 4px 0 0 var(--green);
      }

      .facility-top,
      .metric-row,
      .tag-row,
      .detail-actions,
      .sheet-head,
      .sheet-actions {
        display: flex;
        align-items: center;
        gap: 0.65rem;
      }

      .facility-top {
        justify-content: space-between;
      }

      .facility-top h3 {
        font-size: 1rem;
      }

      .distance {
        display: block;
        margin-top: 0.18rem;
        color: var(--muted);
        font-size: 0.85rem;
      }

      .metric-row,
      .tag-row {
        flex-wrap: wrap;
      }

      .badge,
      .tag {
        display: inline-flex;
        align-items: center;
        gap: 0.3rem;
        min-height: 28px;
        padding: 0 0.55rem;
        border-radius: 999px;
        font-size: 0.78rem;
        font-weight: 780;
        background: #eef2ed;
        color: #334037;
      }

      .badge.quiet,
      .badge.dry,
      .badge.open {
        background: #e3f3ea;
        color: #1e6542;
      }

      .badge.normal,
      .badge.damp {
        background: #fff1cf;
        color: #785114;
      }

      .badge.busy,
      .badge.wet,
      .badge.closed {
        background: #f9e0dc;
        color: #923f31;
      }

      .tag {
        background: #eef1f4;
        color: #4d5961;
        font-weight: 680;
      }

      .map-stage {
        grid-area: map;
        position: relative;
        min-height: 58dvh;
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: #dce8d6;
        box-shadow: var(--shadow);
      }

      #map {
        width: 100%;
        height: min(68dvh, 720px);
        min-height: 440px;
      }

      .map-toolbar {
        position: absolute;
        inset: var(--s2) var(--s2) auto;
        z-index: 450;
        display: grid;
        grid-template-columns: 1fr;
        gap: 0.6rem;
        pointer-events: none;
      }

      .status-summary,
      .map-controls {
        pointer-events: auto;
      }

      .status-summary {
        display: grid;
        gap: 0.12rem;
        padding: 0.75rem 0.9rem;
        border: 1px solid rgba(222, 215, 200, 0.9);
        border-radius: var(--radius);
        background: rgba(255, 253, 248, 0.93);
        box-shadow: 0 14px 34px rgba(53, 45, 31, 0.12);
      }

      .status-summary span {
        color: var(--muted);
        font-size: 0.8rem;
      }

      .status-summary strong {
        font-size: clamp(0.9rem, 0.82rem + 0.3vw, 1.05rem);
      }

      .map-controls {
        display: flex;
        gap: 0.5rem;
        justify-content: flex-end;
      }

      .primary-btn,
      .secondary-btn,
      .text-btn {
        padding: 0 0.95rem;
        font-weight: 800;
      }

      .primary-btn {
        color: white;
        background: var(--green);
        border-color: var(--green);
      }

      .primary-btn:hover {
        transform: translateY(-1px);
        background: var(--green-dark);
        box-shadow: 0 11px 25px rgba(45, 118, 82, 0.24);
      }

      .detail-panel {
        grid-area: detail;
        display: grid;
        align-content: start;
        gap: var(--s2);
        padding: var(--s2);
      }

      .detail-hero {
        display: grid;
        align-content: end;
        gap: var(--s2);
        min-height: 180px;
        padding: var(--s3);
        border-radius: var(--radius);
        color: white;
        background:
          linear-gradient(180deg, rgba(13, 22, 16, 0.08), rgba(13, 22, 16, 0.76)),
          var(--hero, #2d7652);
      }

      .detail-hero h2 {
        max-width: 12ch;
        font-size: clamp(2rem, 1.5rem + 2vw, 3rem);
        line-height: 0.98;
      }

      .detail-section {
        display: grid;
        gap: 0.72rem;
        padding: var(--s2);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: white;
      }

      .detail-section h3 {
        font-size: 0.96rem;
      }

      .info-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 0.66rem;
      }

      .info-item {
        display: grid;
        gap: 0.15rem;
      }

      .info-item small {
        color: var(--muted);
      }

      .info-item strong {
        font-size: 0.95rem;
      }

      .feed-item {
        padding: 0.72rem;
        border-radius: var(--radius);
        background: #f5f2ea;
        color: #3f473d;
        font-size: 0.9rem;
        line-height: 1.45;
      }

      .map-pin,
      .user-pin {
        display: grid;
        place-items: center;
        width: 34px;
        height: 34px;
        border: 3px solid white;
        border-radius: 999px;
        color: white;
        background: var(--green);
        box-shadow: 0 8px 18px rgba(29, 45, 34, 0.28);
      }

      .map-pin.busy,
      .map-pin.wet {
        background: var(--red);
      }

      .map-pin.normal,
      .map-pin.damp {
        background: var(--amber);
        color: #4d3815;
      }

      .user-pin {
        width: 28px;
        height: 28px;
        background: var(--blue);
        box-shadow: 0 0 0 7px rgba(43, 109, 152, 0.18);
      }

      .leaflet-popup-content-wrapper {
        border-radius: var(--radius);
      }

      .sheet-dialog {
        width: min(92vw, 560px);
        padding: 0;
        border: 0;
        border-radius: 10px;
        background: transparent;
      }

      .sheet-dialog::backdrop {
        background: rgba(24, 27, 23, 0.42);
        backdrop-filter: blur(4px);
      }

      .sheet {
        display: grid;
        gap: var(--s2);
        padding: var(--s3);
        border: 1px solid var(--line);
        border-radius: 10px;
        background: var(--paper);
        box-shadow: var(--shadow);
      }

      .sheet-head,
      .sheet-actions {
        justify-content: space-between;
      }

      .sheet label,
      .sheet fieldset {
        display: grid;
        gap: 0.55rem;
        margin: 0;
        padding: 0;
        border: 0;
        color: var(--ink);
        font-weight: 760;
      }

      .sheet select,
      .sheet textarea {
        width: 100%;
        min-height: 48px;
        padding: 0.75rem;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: white;
      }

      .sheet textarea {
        resize: vertical;
      }

      .segmented {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 0.5rem;
      }

      .segmented label {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 48px;
        padding: 0.45rem;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: white;
        font-size: 0.9rem;
      }

      .segmented input {
        accent-color: var(--green);
      }

      .empty {
        display: grid;
        gap: 0.4rem;
        padding: var(--s3);
        border: 1px dashed var(--line);
        border-radius: var(--radius);
        color: var(--muted);
        text-align: center;
      }

      .toast {
        position: fixed;
        left: 50%;
        bottom: calc(1rem + env(safe-area-inset-bottom));
        z-index: 900;
        transform: translate(-50%, 130%);
        width: min(92vw, 370px);
        padding: 0.86rem 1rem;
        border-radius: var(--radius);
        color: white;
        background: #20251f;
        box-shadow: var(--shadow);
        text-align: center;
        transition: transform 220ms ease;
      }

      .toast.show {
        transform: translate(-50%, 0);
      }

      @media (min-width: 760px) {
        .category-screen {
          grid-template-columns: 0.86fr 1.14fr;
          align-items: end;
          min-height: calc(100dvh - 70px);
        }

        .map-screen {
          grid-template-columns: minmax(270px, 330px) minmax(0, 1fr);
          grid-template-areas:
            "sidebar map"
            "detail detail";
          align-items: start;
        }

        .sidebar {
          position: sticky;
          top: 86px;
        }

        .map-toolbar {
          grid-template-columns: minmax(230px, 390px) auto;
          align-items: start;
        }
      }

      @media (min-width: 1120px) {
        .map-screen {
          grid-template-columns: 320px minmax(0, 1fr) 360px;
          grid-template-areas: "sidebar map detail";
          height: calc(100dvh - 72px);
        }

        .map-stage,
        .sidebar,
        .detail-panel {
          height: calc(100dvh - 96px);
        }

        #map {
          height: 100%;
        }

        .detail-panel,
        .facility-list {
          max-height: none;
          overflow: auto;
        }
      }

      @media (max-width: 440px) {
        .topbar {
          align-items: flex-start;
        }

        .brand small {
          display: none;
        }

        .map-controls,
        .detail-actions,
        .sheet-actions {
          align-items: stretch;
          flex-direction: column;
        }

        .primary-btn,
        .secondary-btn,
        .text-btn {
          width: 100%;
        }

        .segmented {
          grid-template-columns: 1fr;
        }
      }

      @media (pointer: coarse) {
        .chip {
          min-height: 44px;
        }
      }
    </style>
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="#" aria-label="코트체크 홈">
        <span class="brand-mark">C</span>
        <span>
          <strong>코트체크</strong>
          <small>내 주변 체육시설 지도</small>
        </span>
      </a>
      <nav class="top-actions" aria-label="빠른 기능">
        <button class="icon-btn" type="button" id="topLocate" aria-label="내 위치 찾기">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 2v3" /><path d="M12 19v3" /><path d="M2 12h3" /><path d="M19 12h3" />
            <circle cx="12" cy="12" r="7" /><circle cx="12" cy="12" r="2" />
          </svg>
        </button>
        <button class="icon-btn" type="button" id="openFavorites" aria-label="즐겨찾기 보기">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polygon points="12 2 15 8.5 22 9.3 16.8 14 18.2 21 12 17.4 5.8 21 7.2 14 2 9.3 9 8.5 12 2" />
          </svg>
        </button>
        <button class="icon-btn" type="button" id="topReport" aria-label="상태 공유">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 11v2a2 2 0 0 0 2 2h3l7 4V5L8 9H5a2 2 0 0 0-2 2Z" />
            <path d="M19 9a4 4 0 0 1 0 6" />
          </svg>
        </button>
      </nav>
    </header>

    <main>
      <section class="category-screen" id="categoryScreen" aria-labelledby="categoryTitle">
        <div class="intro">
          <p class="eyebrow">Wellbeing Sports Map</p>
          <h1 id="categoryTitle">운동할 곳을 찾는 시간을 줄여요.</h1>
          <p>
            운동 종목을 고르면 내 위치 기준으로 가까운 체육시설을 보여줍니다. 운영 시간,
            현재 사람 수, 코트가 젖었는지까지 사용자들이 함께 업데이트할 수 있어요.
          </p>
          <div class="location-strip">
            <span class="location-pill" id="locationStatus">
              <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 2v3" /><path d="M12 19v3" /><path d="M2 12h3" /><path d="M19 12h3" />
                <circle cx="12" cy="12" r="7" />
              </svg>
              위치 확인 전
            </span>
            <button class="text-btn" type="button" id="heroLocate">내 위치로 시작</button>
          </div>
        </div>
        <div class="category-grid" id="categoryGrid" aria-label="운동 카테고리 선택"></div>
      </section>

      <section class="map-screen" id="mapScreen" hidden>
        <aside class="sidebar" aria-label="시설 목록과 필터">
          <div class="sidebar-head">

          state.filter = button.dataset.filter;
          document.querySelectorAll("[data-filter]").forEach((chip) => chip.classList.remove("active"));
          button.classList.add("active");
          renderAll();
        });
      });

      $("#favoritesList").addEventListener("click", (event) => {
        const button = event.target.closest("[data-jump]");
        if (!button) return;
        const facility = facilities.find((item) => item.id === button.dataset.jump);
        favoritesDialog.close();
        if (facility.sport !== state.sport) selectSport(facility.sport);
        setTimeout(() => selectFacility(facility.id), 80);
      });

      function renderCategories() {
        categoryGrid.innerHTML = categories
          .map(
            (category) => `
              <button class="category-card" type="button" data-category="${category.id}">
                <span class="category-icon">${category.icon}</span>
                <span>
                  <h2>${category.name}</h2>
                  <p>${category.desc}</p>
                </span>
              </button>
            `,
          )
          .join("");
      }

      function locateUser() {
        if (!navigator.geolocation) {
          showToast("이 브라우저는 위치 기능을 지원하지 않아요.");
          return;
        }

        $("#locationStatus").innerHTML = `${targetIcon()} 위치 확인 중`;
        navigator.geolocation.getCurrentPosition(
          (position) => {
            state.userLocation = {
              lat: position.coords.latitude,
              lng: position.coords.longitude,
              label: "내 위치 기준",
            };
            localStorage.setItem("courtcheckLocation", JSON.stringify(state.userLocation));
            refreshLocationLabel();
            showToast("내 위치를 기준으로 다시 정렬했어요.");
            if (state.map) {
              drawUserMarker();
              state.map.setView([state.userLocation.lat, state.userLocation.lng], 14);
              renderAll();
            }
          },
          () => {
            state.userLocation = fallbackLocation;
            refreshLocationLabel();
            showToast("위치 권한이 없어 기본 위치로 보여줄게요.");
            if (state.map) renderAll();
          },
          { enableHighAccuracy: true, timeout: 8000, maximumAge: 60000 },
        );
      }

      function refreshLocationLabel() {
        $("#locationStatus").innerHTML = `${targetIcon()} ${state.userLocation.label || "내 위치 기준"}`;
      }

      function setupMap() {
        if (state.map || !window.L) return;
        state.map = L.map("map", { zoomControl: false }).setView(
          [state.userLocation.lat, state.userLocation.lng],
          13,
        );
        L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", {
          maxZoom: 19,
          attribution: "&copy; OpenStreetMap",
        }).addTo(state.map);
        L.control.zoom({ position: "bottomright" }).addTo(state.map);
        drawUserMarker();
      }

      function drawUserMarker() {
        if (!state.map) return;
        if (state.userMarker) state.userMarker.remove();
        const icon = L.divIcon({
          className: "",
          html: '<span class="user-pin">●</span>',
          iconSize: [28, 28],
          iconAnchor: [14, 14],
        });
        state.userMarker = L.marker([state.userLocation.lat, state.userLocation.lng], { icon })
          .addTo(state.map)
          .bindPopup("현재 위치");
      }

      function selectSport(sport) {
        state.sport = sport;
        state.selectedId = facilities.find((facility) => facility.sport === sport)?.id || null;
        $("#selectedSportTitle").textContent = categories.find((category) => category.id === sport).name;
        categoryScreen.hidden = true;
        mapScreen.hidden = false;
        refreshReportOptions();
        setTimeout(() => {
          setupMap();
          state.map.invalidateSize();
          renderAll();
        }, 0);
      }

      function fresh(facility) {
        const report = state.reports[facility.id];
        if (!report) return { ...facility, distance: distanceFromUser(facility) };
        return {
          ...facility,
          crowd: report.crowd,
          surface: report.surface,
          updated: report.updated,
          notes: [report.note || "사용자가 방금 상태를 공유했어요.", ...facility.notes],
          distance: distanceFromUser(facility),
        };
      }

      function distanceFromUser(facility) {
        const radius = 6371;
        const dLat = toRad(facility.lat - state.userLocation.lat);
        const dLng = toRad(facility.lng - state.userLocation.lng);
        const lat1 = toRad(state.userLocation.lat);
        const lat2 = toRad(facility.lat);
        const a =
          Math.sin(dLat / 2) ** 2 +
          Math.cos(lat1) * Math.cos(lat2) * Math.sin(dLng / 2) ** 2;
        return radius * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
      }

      function toRad(value) {
        return (value * Math.PI) / 180;
      }

      function currentFacilities() {
        const query = facilitySearch.value.trim().toLowerCase();
        return facilities
          .filter((facility) => facility.sport === state.sport)
          .map(fresh)
          .filter((facility) => {
            if (state.filter === "open" && !isOpen(facility.hours)) return false;
            if (state.filter === "quiet" && facility.crowd !== "quiet") return false;
            if (state.filter === "dry" && facility.surface !== "dry") return false;
            if (state.filter === "near" && facility.distance > 1) return false;
            if (!query) return true;
            return [facility.name, facility.area, facility.tags.join(" "), facility.equipment]
              .join(" ")
              .toLowerCase()
              .includes(query);
          })
          .sort((a, b) => a.distance - b.distance);
      }

      function isOpen(hours) {
        if (hours === "24시간") return true;
        const [start, end] = hours.split("-");
        const toMinutes = (value) => {
          const [h, m] = value.split(":").map(Number);
          return h * 60 + m;
        };
        const now = new Date();
        const current = now.getHours() * 60 + now.getMinutes();
        return current >= toMinutes(start) && current <= toMinutes(end);
      }

      function renderAll() {
        renderList();
        renderMarkers();
        renderDetail();
      }

      function renderList() {
        const list = currentFacilities();
        $("#facilityCount").textContent = `${list.length}곳 표시 중`;
        const best = list.find((facility) => facility.crowd === "quiet" && facility.surface === "dry") || list[0];
        $("#bestPick").textContent = best ? `지금 추천: ${best.name}` : "조건에 맞는 시설이 없어요";

        if (!list.length) {
          facilityList.innerHTML = `<div class="empty"><strong>검색 결과가 없어요</strong><span>필터를 줄이거나 다른 종목을 골라보세요.</span></div>`;
          return;
        }

        facilityList.innerHTML = list
          .map(
            (facility) => `
              <button class="facility-card ${facility.id === state.selectedId ? "selected" : ""}" type="button" data-facility="${facility.id}">
                <span class="facility-top">
                  <span>
                    <h3>${facility.name}</h3>
                    <span class="distance">${facility.area} · ${facility.distance.toFixed(1)}km</span>
                  </span>
                  <span class="badge ${isOpen(facility.hours) ? "open" : "closed"}">${isOpen(facility.hours) ? "운영중" : "운영종료"}</span>
                </span>
                <span class="metric-row">
                  <span class="badge ${facility.crowd}">사람 ${labels.crowd[facility.crowd]}</span>
                  <span class="badge ${facility.surface}">코트 ${labels.surface[facility.surface]}</span>
                  <span class="badge">${facility.updated}</span>
                </span>
              </button>
            `,
          )
          .join("");
      }

      function renderMarkers() {
        if (!state.map) return;
        state.markers.forEach((marker) => marker.remove());
        state.markers.clear();
        drawUserMarker();
        const list = currentFacilities();
        const bounds = [[state.userLocation.lat, state.userLocation.lng]];

        list.forEach((facility) => {
          const icon = L.divIcon({
            className: "",
            html: `<span class="map-pin ${facility.crowd} ${facility.surface}">${pinText(facility.sport)}</span>`,
            iconSize: [34, 34],
            iconAnchor: [17, 17],
          });
          const marker = L.marker([facility.lat, facility.lng], { icon })
            .addTo(state.map)
            .bindPopup(`<strong>${facility.name}</strong><br>${facility.distance.toFixed(1)}km · ${facility.people}`);
          marker.on("click", () => selectFacility(facility.id, false));
          state.markers.set(facility.id, marker);
          bounds.push([facility.lat, facility.lng]);
        });

        if (bounds.length > 1) state.map.fitBounds(bounds, { padding: [48, 48], maxZoom: 14 });
      }

      function selectFacility(id, pan = true) {
        state.selectedId = id;
        renderList();
        renderDetail();
        const facility = fresh(facilities.find((item) => item.id === id));
        const marker = state.markers.get(id);
        if (marker) marker.openPopup();
        if (pan && state.map) state.map.setView([facility.lat, facility.lng], 15);
      }

      function renderDetail() {
        const source = facilities.find((facility) => facility.id === state.selectedId);
        if (!source) {
          detailPanel.innerHTML = `<div class="empty"><strong>시설을 선택하세요</strong><span>지도 핀이나 목록을 누르면 자세한 정보가 표시됩니다.</span></div>`;
          return;
        }

        const facility = fresh(source);
        const favorite = state.favorites.includes(facility.id);
        detailPanel.innerHTML = `
          <div class="detail-hero" style="--hero:${facility.color}">
            <div class="tag-row">
              <span class="badge ${isOpen(facility.hours) ? "open" : "closed"}">${isOpen(facility.hours) ? "운영중" : "운영종료"}</span>
              <span class="badge ${facility.crowd}">사람 ${labels.crowd[facility.crowd]}</span>
              <span class="badge ${facility.surface}">코트 ${labels.surface[facility.surface]}</span>
            </div>
            <h2>${facility.name}</h2>
            <p>${facility.area} · 내 위치에서 ${facility.distance.toFixed(1)}km</p>
          </div>
          <div class="detail-actions">
            <button class="primary-btn" type="button" data-favorite="${facility.id}">
              ${favorite ? starIcon(true) : starIcon(false)}
              ${favorite ? "즐겨찾기 해제" : "즐겨찾기"}
            </button>
            <button class="secondary-btn" type="button" data-report="${facility.id}">
              ${megaphoneIcon()}
              상태 공유
            </button>
          </div>
          <section class="detail-section">
            <h3>기본 정보</h3>
            <div class="info-grid">
              <span class="info-item"><small>이용 시간</small><strong>${facility.hours}</strong></span>
              <span class="info-item"><small>이용료</small><strong>${facility.cost}</strong></span>
              <span class="info-item"><small>현재 인원</small><strong>${facility.people}</strong></span>
              <span class="info-item"><small>업데이트</small><strong>${facility.updated}</strong></span>
            </div>
          </section>
          <section class="detail-section">
            <h3>시설 체크</h3>
            <div class="feed">
              <div class="feed-item"><strong>장비</strong><br>${facility.equipment}</div>
              <div class="feed-item"><strong>조명</strong><br>${facility.lighting}</div>
              <div class="feed-item"><strong>안전</strong><br>${facility.safety}</div>
            </div>
            <div class="tag-row">${facility.tags.map((tag) => `<span class="tag">${tag}</span>`).join("")}</div>
          </section>
          <section class="detail-section">
            <h3>사용자 공유</h3>
            <div class="feed">${facility.notes.map((note) => `<div class="feed-item">${note}</div>`).join("")}</div>
          </section>
        `;
      }

      function refreshReportOptions() {
        const list = facilities.filter((facility) => !state.sport || facility.sport === state.sport);
        reportFacility.innerHTML = list.map((facility) => `<option value="${facility.id}">${facility.name}</option>`).join("");
      }

      function openReport(id = state.selectedId) {
        refreshReportOptions();
        if (id) reportFacility.value = id;
        reportDialog.showModal();
      }

      function saveReport(event) {
        event.preventDefault();
        const data = new FormData($("#reportForm"));
        const id = reportFacility.value;
        state.reports[id] = {
          crowd: data.get("crowd"),
          surface: data.get("surface"),
          note: $("#reportNote").value.trim(),
          updated: "방금 전",
        };
        localStorage.setItem("courtcheckReports", JSON.stringify(state.reports));
        $("#reportNote").value = "";
        reportDialog.close();
        if (state.sport) renderAll();
        showToast("상태를 공유했어요. 지도와 목록에 바로 반영됩니다.");
      }

      function toggleFavorite(id) {
        if (state.favorites.includes(id)) {
          state.favorites = state.favorites.filter((item) => item !== id);
          showToast("즐겨찾기에서 제거했어요.");
        } else {
          state.favorites.push(id);
          showToast("즐겨찾기에 추가했어요.");
        }
        localStorage.setItem("courtcheckFavorites", JSON.stringify(state.favorites));
        renderDetail();
      }

      function openFavorites() {
        const list = state.favorites
          .map((id) => facilities.find((facility) => facility.id === id))
          .filter(Boolean)
          .map(fresh)
          .sort((a, b) => a.distance - b.distance);
        $("#favoritesList").innerHTML = list.length
          ? list
              .map(
                (facility) => `
                  <button class="facility-card" type="button" data-jump="${facility.id}">
                    <span class="facility-top">
                      <span>
                        <h3>${facility.name}</h3>
                        <span class="distance">${categories.find((item) => item.id === facility.sport).name} · ${facility.distance.toFixed(1)}km</span>
                      </span>
                      <span class="badge ${facility.surface}">${labels.surface[facility.surface]}</span>
                    </span>
                    <span class="metric-row">
                      <span class="badge ${facility.crowd}">사람 ${labels.crowd[facility.crowd]}</span>
                      <span class="badge">${facility.updated}</span>
                    </span>
                  </button>
                `,
              )
              .join("")
          : `<div class="empty"><strong>아직 즐겨찾기가 없어요</strong><span>자주 가는 시설을 저장해두면 바로 확인할 수 있어요.</span></div>`;
        favoritesDialog.showModal();
      }

      function recommend() {
        const list = currentFacilities().filter((facility) => facility.surface !== "wet");
        const best = list.find((facility) => facility.crowd === "quiet" && facility.surface === "dry") || list[0];
        if (!best) {
          showToast("지금 추천할 수 있는 시설이 없어요.");
          return;
        }
        selectFacility(best.id);
        showToast(`${best.name} 추천. ${best.distance.toFixed(1)}km, ${labels.crowd[best.crowd]}, 코트 ${labels.surface[best.surface]}.`);
      }

      function showToast(message) {
        toast.textContent = message;
        toast.classList.add("show");
        clearTimeout(showToast.timer);
        showToast.timer = setTimeout(() => toast.classList.remove("show"), 2600);
      }

      function pinText(sport) {
        return { basketball: "B", futsal: "F", badminton: "D", tennis: "T", running: "R", fitness: "G" }[sport] || "S";
      }

      function ballIcon() {
        return `<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M3.6 9h16.8"/><path d="M3.6 15h16.8"/><path d="M12 3a14 14 0 0 0 0 18"/><path d="M12 3a14 14 0 0 1 0 18"/></svg>`;
      }

      function goalIcon() {
        return `<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19V7h16v12"/><path d="M4 11h16"/><path d="M8 19V7"/><path d="M16 19V7"/></svg>`;
      }

      function waveIcon() {
        return `<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 17c5 0 5-10 10-10 3 0 4 3 6 3"/><path d="M5 21 19 7"/></svg>`;
      }

      function tennisIcon() {
        return `<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M5 6c5 3 9 8 13 13"/><path d="M19 5c-4 5-8 9-14 13"/></svg>`;
      }

      function routeIcon() {
        return `<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="6" cy="19" r="3"/><circle cx="18" cy="5" r="3"/><path d="M9 19h3a6 6 0 0 0 6-6V8"/></svg>`;
      }

      function dumbbellIcon() {
        return `<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 7 11 11"/><path d="m7 6-2 2"/><path d="m19 16-3 3"/><path d="m3 10 3-3 11 11-3 3z"/></svg>`;
      }

      function targetIcon() {
        return `<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v3"/><path d="M12 19v3"/><path d="M2 12h3"/><path d="M19 12h3"/><circle cx="12" cy="12" r="7"/></svg>`;
      }

      function starIcon(filled) {
        return `<svg class="icon" viewBox="0 0 24 24" ${filled ? 'fill="currentColor"' : 'fill="none"'} stroke="currentColor" stroke-width="2"><polygon points="12 2 15 8.5 22 9.3 16.8 14 18.2 21 12 17.4 5.8 21 7.2 14 2 9.3 9 8.5 12 2"/></svg>`;
      }

      function megaphoneIcon() {
        return `<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 11v2a2 2 0 0 0 2 2h3l7 4V5L8 9H5a2 2 0 0 0-2 2Z"/><path d="M19 9a4 4 0 0 1 0 6"/></svg>`;
      }
    </script>
  </body>
</html>

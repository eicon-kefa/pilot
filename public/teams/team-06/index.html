<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>핏밀(FitMeal) — 맞춤 운동·식단</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Apple SD Gothic Neo',sans-serif;background:#f0fdf4;min-height:100vh;display:flex;flex-direction:column}
  header{background:linear-gradient(135deg,#16a34a,#15803d);padding:16px 20px;display:flex;align-items:center;justify-content:space-between}
  .logo{font-size:20px;font-weight:800;color:#fff;letter-spacing:-0.02em}
  .badge{font-size:11px;background:rgba(255,255,255,0.2);color:#fff;padding:4px 10px;border-radius:999px}
  main{flex:1;padding:16px;display:flex;flex-direction:column;gap:14px}
  .profile-card{background:#fff;border-radius:16px;padding:18px;display:flex;align-items:center;gap:14px;box-shadow:0 2px 8px rgba(22,163,74,0.08)}
  .profile-avatar{width:54px;height:54px;border-radius:50%;background:linear-gradient(135deg,#86efac,#4ade80);display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0}
  .profile-name{font-size:16px;font-weight:700;color:#111}
  .profile-meta{font-size:12px;color:#9ca3af;margin-top:2px}
  .profile-tags{display:flex;gap:6px;margin-top:8px}
  .tag{font-size:11px;font-weight:600;padding:3px 10px;border-radius:999px}
  .ring-card{background:#fff;border-radius:16px;padding:18px;display:flex;align-items:center;gap:20px;box-shadow:0 2px 8px rgba(22,163,74,0.08)}
  .ring-wrap{position:relative;width:90px;height:90px;flex-shrink:0}
  svg.ring{width:90px;height:90px;transform:rotate(-90deg)}
  .ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .ring-pct{font-size:22px;font-weight:800;color:#111}
  .ring-label{font-size:10px;color:#9ca3af}
  .workout-list{flex:1;display:flex;flex-direction:column;gap:8px}
  .workout-item{display:flex;align-items:center;gap:10px;font-size:13px;color:#374151}
  .w-check{width:22px;height:22px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
  .done{background:#16a34a;color:#fff}
  .todo{background:#f3f4f6;color:#9ca3af}
  .meal-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .meal-card{background:#fff;border-radius:14px;padding:14px;box-shadow:0 2px 8px rgba(22,163,74,0.06)}
  .meal-header{display:flex;align-items:center;gap:8px;margin-bottom:10px}
  .meal-icon{font-size:20px}
  .meal-title{font-size:13px;font-weight:700;color:#111}
  .meal-item{font-size:12px;color:#6b7280;padding:4px 0;border-bottom:1px solid #f3f4f6;display:flex;justify-content:space-between}
  .meal-item:last-child{border-bottom:none}
  .meal-cal{color:#16a34a;font-weight:600}
  .cta-btn{background:linear-gradient(135deg,#16a34a,#15803d);color:#fff;border-radius:14px;padding:15px;text-align:center;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
  nav{display:flex;background:#fff;border-top:1px solid #f3f4f6;padding:10px 0}
  nav a{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;font-size:10px;color:#9ca3af;text-decoration:none}
  nav a.active{color:#16a34a}
  nav .icon{font-size:20px}
  .pilot-banner{background:#dcfce7;border-top:1px solid #bbf7d0;padding:8px 16px;text-align:center;font-size:11px;color:#166534}
</style>
</head>
<body>
<header>
  <div class="logo">핏밀 FitMeal 🥗</div>
  <span class="badge">team-6</span>
</header>
<main>
  <div class="profile-card">
    <div class="profile-avatar">🏃</div>
    <div>
      <div class="profile-name">나의 핏밀 프로필</div>
      <div class="profile-meta">키 172cm · 몸무게 65kg · 목표: 체지방 감소</div>
      <div class="profile-tags">
        <span class="tag" style="background:#dcfce7;color:#166534">슬림형</span>
        <span class="tag" style="background:#dbeafe;color:#1e40af">중급자</span>
        <span class="tag" style="background:#fef9c3;color:#92400e">홈 운동</span>
      </div>
    </div>
  </div>

  <div class="ring-card">
    <div class="ring-wrap">
      <svg class="ring" viewBox="0 0 90 90">
        <circle cx="45" cy="45" r="36" fill="none" stroke="#f3f4f6" stroke-width="10"/>
        <circle cx="45" cy="45" r="36" fill="none" stroke="#16a34a" stroke-width="10"
          stroke-dasharray="150 76" stroke-linecap="round"/>
      </svg>
      <div class="ring-center"><div class="ring-pct">65%</div><div class="ring-label">달성</div></div>
    </div>
    <div class="workout-list">
      <div style="font-size:12px;font-weight:700;color:#9ca3af;margin-bottom:2px">오늘의 운동</div>
      <div class="workout-item"><span class="w-check done">✓</span>스트레칭 10분</div>
      <div class="workout-item"><span class="w-check done">✓</span>스쿼트 3세트</div>
      <div class="workout-item"><span class="w-check todo">○</span>플랭크 1분 × 3</div>
      <div class="workout-item"><span class="w-check todo">○</span>유산소 20분</div>
    </div>
  </div>

  <div class="meal-row">
    <div class="meal-card">
      <div class="meal-header"><span class="meal-icon">🌅</span><span class="meal-title">아침 추천</span></div>
      <div class="meal-item">귀리 + 바나나<span class="meal-cal">340</span></div>
      <div class="meal-item">삶은 달걀 2개<span class="meal-cal">140</span></div>
      <div class="meal-item">저지방 우유<span class="meal-cal">80</span></div>
    </div>
    <div class="meal-card">
      <div class="meal-header"><span class="meal-icon">🌇</span><span class="meal-title">저녁 추천</span></div>
      <div class="meal-item">닭가슴살 구이<span class="meal-cal">200</span></div>
      <div class="meal-item">현미밥 반공기<span class="meal-cal">160</span></div>
      <div class="meal-item">나물 반찬<span class="meal-cal">60</span></div>
    </div>
  </div>

  <div class="cta-btn">💪 다음 운동 시작하기</div>
</main>
<nav>
  <a href="#" class="active"><span class="icon">🏠</span>홈</a>
  <a href="#"><span class="icon">🏋️</span>운동</a>
  <a href="#"><span class="icon">🥗</span>식단</a>
  <a href="#"><span class="icon">📊</span>기록</a>
</nav>
<div class="pilot-banner">파일럿 산출물 — team-6 · 핏밀(FitMeal) | 기획: 조은혁 · 디자인: 이예준 · 개발: 류하진</div>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SleepLog - 청소년 수면 관리 앱</title>
    <style>
        /* [CSS 영역] 앱의 디자인을 담당하는 부분입니다. 밝고 깔끔한 느낌을 주었습니다. */
        
        /* 기본 배경과 폰트 설정 */
        body {
            font-family: 'Pretendard', 'Malgun Gothic', sans-serif;
            background-color: #EBF5FB; /* 밝고 편안한 하늘색 배경 */
            display: flex;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }

        /* 스마트폰 화면처럼 보이게 하는 메인 박스 */
        .app-container {
            width: 100%;
            max-width: 400px;
            background-color: white;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            padding: 20px;
            box-sizing: border-box;
            position: relative; /* 알림창 띄우기를 위한 설정 */
            overflow: hidden;
        }

        /* 앱 제목 스타일 */
        h1 {
            text-align: center;
            color: #2874A6;
            margin-top: 0;
        }
        
        h2 {
            font-size: 16px;
            color: #333;
            margin-bottom: 10px;
        }

        /* 수면 시간 선택 버튼 스타일 */
        .time-selector {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }

        .time-btn {
            flex: 1 1 30%;
            padding: 10px 5px;
            border: 2px solid #AED6F1;
            background-color: white;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            color: #2874A6;
            transition: 0.3s;
        }

        /* 수면 시간을 선택했을 때의 디자인 변경 */
        .time-btn.active {
            background-color: #2874A6;
            color: white;
        }

        /* 메모 입력창 스타일 */
        textarea {
            width: 100%;
            height: 60px;
            border: 1px solid #ccc;
            border-radius: 10px;
            padding: 10px;
            box-sizing: border-box;
            resize: none;
            margin-bottom: 20px;
        }

        /* 권장 수면 시간(Y/N) 라디오 버튼 영역 */
        .goal-check {
            background-color: #FCF3CF; /* 따뜻한 노란색 배경 */
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: bold;
        }

        /* 꽉 차는 메인 버튼 (저장하기 등) */
        .primary-btn {
            width: 100%;
            background-color: #2ECC71; /* 눈이 편안한 초록색 */
            color: white;
            border: none;
            padding: 15px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 20px;
        }
        
        .primary-btn:hover { background-color: #27AE60; }

        /* 하단 메뉴 버튼 (일주일, 이번달, 컬렉션) */
        .menu-container {
            display: flex;
            gap: 5px;
            border-top: 1px solid #eee;
            padding-top: 15px;
        }

        .menu-btn {
            flex: 1;
            padding: 10px 5px;
            border: none;
            background-color: #AED6F1;
            color: #154360;
            border-radius: 5px;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
        }

        .menu-btn:hover { background-color: #85C1E9; }

        /* 화면에 결과를 보여줄 공간 (그래프, 배지 등) */
        #display-area {
            margin-top: 20px;
            padding: 15px;
            background-color: #F8F9F9;
            border-radius: 10px;
            min-height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            text-align: center;
        }

        /* [기능 1] 그래프 막대 스타일 */
        .graph-container {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            height: 120px;
            gap: 15px;
            width: 100%;
        }
        
        .bar {
            width: 30px;
            background-color: #3498DB;
            border-radius: 5px 5px 0 0;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            color: white;
            font-size: 12px;
            padding-top: 5px;
            transition: height 0.5s; /* 그래프가 스르륵 올라가는 효과 */
        }

        /* [기능 3] 배지 컬렉션 스타일 */
        .badge {
            font-size: 40px;
            margin: 5px;
        }

        /* [기능 2] 잠잘 시간 알림창 스타일 (처음엔 숨겨둠) */
        #notification {
            position: absolute;
            top: -60px;
            left: 50%;
            transform: translateX(-50%);
            background-color: #2C3E50;
            color: white;
            padding: 15px 20px;
            border-radius: 30px;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: 0.5s;
            width: 80%;
            text-align: center;
            z-index: 10;
        }
        /* 알림창이 보일 때 적용될 클래스 */
        #notification.show { top: 20px; }

    </style>
</head>
<body>

    <div class="app-container">
        <!-- 알림창 (기능 2) -->
        <div id="notification">🌙 앗! 잘 시간이에요. 스마트폰을 끄고 누워볼까요?</div>

        <h1>SleepLog</h1>

        <h2>오늘의 수면시간을 선택하세요</h2>
        <!-- 수면 시간 선택 버튼들 -->
        <div class="time-selector" id="time-btns">
            <button class="time-btn" onclick="selectTime(4)">4시간 이하</button>
            <button class="time-btn" onclick="selectTime(5)">5시간</button>
            <button class="time-btn" onclick="selectTime(6)">6시간</button>
            <button class="time-btn" onclick="selectTime(7)">7시간</button>
            <button class="time-btn" onclick="selectTime(8)">8시간</button>
            <button class="time-btn" onclick="selectTime(9)">9시간</button>
            <button class="time-btn" onclick="selectTime(10)">10시간 이상</button>
        </div>

        <h2>메모를 입력하세요</h2>
        <textarea id="memo" placeholder="오늘 꾼 꿈이나 기분을 자유롭게 적어보세요!"></textarea>

        <!-- 권장 수면시간 체크 영역 -->
        <div class="goal-check">
            권장 수면 시간(9시간)을 잤나요?<br><br>
            <label><input type="radio" name="goal" value="Y" id="goal-y"> 네 (Y)</label> &nbsp;&nbsp;&nbsp;
            <label><input type="radio" name="goal" value="N" id="goal-n"> 아니요 (N)</label>
        </div>

        <!-- 저장 버튼 -->
        <button class="primary-btn" onclick="saveData()">💾 저장하기</button>

        <!-- 하단 메뉴 -->
        <div class="menu-container">
            <button class="menu-btn" onclick="showGraph('week')">일주일 기록 보기</button>
            <button class="menu-btn" onclick="showGraph('month')">이번 달 기록 보기</button>
            <button class="menu-btn" onclick="showCollection()">배지 컬렉션</button>
        </div>

        <!-- 결과(그래프/배지)가 표시될 화면 -->
        <div id="display-area">
            기록을 저장하거나 하단 메뉴를 눌러보세요!
        </div>
    </div>

    <script>
        /* [JavaScript 영역] 앱의 동작(기능)을 담당하는 부분입니다. */

        // 데이터 저장을 위한 변수 (데이터베이스 대신 사용)
        let selectedTime = 0;           // 선택한 수면 시간
        let sleepRecords = [7, 6, 8, 5, 9, 7]; // 임시 일주일 데이터 (마지막 요소는 오늘을 위해 비워둠 느낌)
        let badges = ["⭐", "🌙", "🏆"];      // 임시로 모은 배지들 (기본적으로 3개 있다고 가정)

        // 1. 수면 시간을 선택할 때 실행되는 함수
        function selectTime(time) {
            selectedTime = time; // 선택한 시간을 변수에 저장

            // 모든 버튼의 색상을 원래대로 되돌림
            const buttons = document.querySelectorAll('.time-btn');
            buttons.forEach(btn => btn.classList.remove('active'));

            // 클릭한 버튼(이벤트가 발생한 요소)만 색상을 변경
            event.target.classList.add('active');

            // 9시간 이상을 선택하면 권장 수면 시간 'Y'를 자동으로 체크해줌
            if(time >= 9) {
                document.getElementById('goal-y').checked = true;
            } else {
                document.getElementById('goal-n').checked = true;
            }
        }

        // 2. [저장하기] 버튼을 누를 때 실행되는 함수
        function saveData() {
            if(selectedTime === 0) {
                alert("수면 시간을 먼저 선택해주세요!");
                return; // 함수 종료
            }

            // 배열에 방금 입력한 수면 시간 추가 (기록 누적)
            sleepRecords.push(selectedTime);

            // Y를 선택했다면 배지를 하나 추가해줌 (기능 3)
            const isGoalAchieved = document.getElementById('goal-y').checked;
            if(isGoalAchieved) {
                badges.push("👑"); // 왕관 배지 추가
                alert("권장 수면시간을 채웠어요! 배지(👑)를 획득했습니다! 🎉");
            } else {
                alert("저장되었습니다! 내일은 조금 더 푹 자보아요 😊");
            }

            // 저장 후 일주일 그래프 보여주기
            showGraph('week');
        }

        // 3. 그래프 보여주기 함수 (기능 1)
        function showGraph(type) {
            const display = document.getElementById('display-area');
            display.innerHTML = `<h3>${type === 'week' ? '일주일' : '이번 달'} 수면 기록 그래프</h3>`;
            
            // 그래프를 그릴 빈 공간 만들기
            const graphContainer = document.createElement('div');
            graphContainer.className = 'graph-container';

            // 최근 7일(또는 전부) 데이터만 가져오기
            let dataToShow = sleepRecords.slice(-7); 

            // 데이터 수량만큼 반복해서 막대(div)를 만듦
            dataToShow.forEach(time => {
                const bar = document.createElement('div');
                bar.className = 'bar';
                bar.innerText = time + "h"; // 막대기 위에 시간 글씨 쓰기
                
                // 시간 높이에 비례해서 막대기 높이 설정 (1시간당 10px + 기본 20px)
                bar.style.height = (time * 10 + 20) + "px"; 
                
                // 9시간 이상이면 색깔을 특별한 금색으로 변경
                if(time >= 9) bar.style.backgroundColor = "#F1C40F"; 

                graphContainer.appendChild(bar); // 만든 막대를 그래프 공간에 넣기
            });

            display.appendChild(graphContainer); // 완성된 그래프를 화면에 표시
        }

        // 4. 배지 컬렉션 보여주기 함수 (기능 3)
        function showCollection() {
            const display = document.getElementById('display-area');
            display.innerHTML = "<h3>나의 수면 배지 컬렉션</h3>";

            if(badges.length === 0) {
                display.innerHTML += "<p>아직 획득한 배지가 없어요. 9시간 수면에 도전하세요!</p>";
                return;
            }

            // 모은 배지들을 화면에 나열하기
            const badgeContainer = document.createElement('div');
            badges.forEach(badge => {
                const span = document.createElement('span');
                span.className = 'badge';
                span.innerText = badge;
                badgeContainer.appendChild(span);
            });

            display.appendChild(badgeContainer);
        }

        // 5. 잠잘 시간 알림 보내기 (기능 2)
        // 실제 앱의 푸시 알림처럼 보이게 하기 위해 5초 뒤에 화면 상단에서 알림이 내려옵니다.
        setTimeout(() => {
            const noti = document.getElementById('notification');
            noti.classList.add('show'); // show 클래스를 추가해서 화면에 보이게 함

            // 4초 뒤에 알림창 다시 숨기기
            setTimeout(() => {
                noti.classList.remove('show');
            }, 4000);
        }, 5000); // 페이지를 열고 5초 (5000ms) 뒤에 실행

    </script>
</body>
</html>

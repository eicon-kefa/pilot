<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>sleeplog — 수면 관리</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Apple SD Gothic Neo',sans-serif;background:#1e1b4b;min-height:100vh;display:flex;flex-direction:column;color:#fff}
  header{padding:20px 24px;display:flex;align-items:center;justify-content:space-between}
  .logo{font-size:22px;font-weight:800;color:#fff;letter-spacing:-0.03em}
  .badge{font-size:11px;background:rgba(255,255,255,0.12);color:#a5b4fc;padding:4px 10px;border-radius:999px}
  main{flex:1;padding:0 20px 20px;display:flex;flex-direction:column;gap:16px}
  .sleep-hero{background:linear-gradient(135deg,#312e81,#4c1d95);border-radius:20px;padding:24px;text-align:center}
  .sleep-time{font-size:48px;font-weight:800;color:#fff;letter-spacing:-0.04em;line-height:1}
  .sleep-sub{font-size:13px;color:#a5b4fc;margin-top:6px}
  .sleep-score{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,0.1);border-radius:999px;padding:6px 16px;margin-top:14px;font-size:13px;color:#c4b5fd}
  .score-num{font-size:20px;font-weight:800;color:#a78bfa}
  .card{background:rgba(255,255,255,0.06);border-radius:16px;padding:18px;border:1px solid rgba(255,255,255,0.08)}
  .card-title{font-size:11px;font-weight:600;color:#a5b4fc;letter-spacing:.06em;text-transform:uppercase;margin-bottom:14px}
  .chart{display:flex;align-items:flex-end;gap:8px;height:80px}
  .bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px}
  .bar{width:100%;border-radius:4px;transition:height .3s}
  .bar-label{font-size:9px;color:#6b7280}
  .bar-val{font-size:9px;color:#a5b4fc}
  .badge-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
  .badge-item{background:rgba(255,255,255,0.06);border-radius:12px;padding:12px 8px;text-align:center;border:1px solid rgba(255,255,255,0.08)}
  .badge-icon{font-size:24px;margin-bottom:4px}
  .badge-name{font-size:9px;color:#a5b4fc;font-weight:600}
  .badge-item.locked{opacity:0.3}
  .alarm-card{background:linear-gradient(135deg,#7c3aed,#4f46e5);border-radius:16px;padding:18px;display:flex;align-items:center;justify-content:space-between}
  .alarm-time{font-size:32px;font-weight:800;color:#fff}
  .alarm-sub{font-size:12px;color:#c4b5fd;margin-top:2px}
  .toggle{width:52px;height:28px;background:#a78bfa;border-radius:14px;position:relative;cursor:pointer}
  .toggle::after{content:'';position:absolute;top:4px;right:4px;width:20px;height:20px;background:#fff;border-radius:50%}
  nav{display:flex;background:rgba(255,255,255,0.05);border-top:1px solid rgba(255,255,255,0.08);padding:10px 0}
  nav a{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;font-size:10px;color:#6b7280;text-decoration:none}
  nav a.active{color:#a78bfa}
  nav .icon{font-size:20px}
  .pilot-banner{background:#2e1065;border-top:1px solid rgba(167,139,250,0.2);padding:8px 16px;text-align:center;font-size:11px;color:#a5b4fc}
</style>
</head>
<body>
<header>
  <div class="logo">sleeplog 🌙</div>
  <span class="badge">team-4</span>
</header>
<main>
  <div class="sleep-hero">
    <div class="sleep-sub">어젯밤 수면 시간</div>
    <div class="sleep-time">7h 23m</div>
    <div class="sleep-score"><span class="score-num">82</span>수면 점수</div>
  </div>

  <div class="card">
    <div class="card-title">이번 주 수면 기록</div>
    <div class="chart">
      <div class="bar-wrap"><div class="bar" style="height:75%;background:#7c3aed"></div><div class="bar-label">월</div><div class="bar-val">6h</div></div>
      <div class="bar-wrap"><div class="bar" style="height:90%;background:#7c3aed"></div><div class="bar-label">화</div><div class="bar-val">7.5h</div></div>
      <div class="bar-wrap"><div class="bar" style="height:60%;background:#ef4444"></div><div class="bar-label">수</div><div class="bar-val">5h</div></div>
      <div class="bar-wrap"><div class="bar" style="height:85%;background:#7c3aed"></div><div class="bar-label">목</div><div class="bar-val">7h</div></div>
      <div class="bar-wrap"><div class="bar" style="height:95%;background:#7c3aed"></div><div class="bar-label">금</div><div class="bar-val">8h</div></div>
      <div class="bar-wrap"><div class="bar" style="height:80%;background:#7c3aed"></div><div class="bar-label">토</div><div class="bar-val">6.5h</div></div>
      <div class="bar-wrap"><div class="bar" style="height:88%;background:#a78bfa;border:2px solid #c4b5fd"></div><div class="bar-label">일</div><div class="bar-val">7.3h</div></div>
    </div>
  </div>

  <div class="alarm-card">
    <div>
      <div class="alarm-sub">취침 알림</div>
      <div class="alarm-time">오후 11:00</div>
    </div>
    <div class="toggle"></div>
  </div>

  <div class="card">
    <div class="card-title">획득한 배지</div>
    <div class="badge-row">
      <div class="badge-item"><div class="badge-icon">🌙</div><div class="badge-name">첫 기록</div></div>
      <div class="badge-item"><div class="badge-icon">⭐</div><div class="badge-name">7일 연속</div></div>
      <div class="badge-item"><div class="badge-icon">🏆</div><div class="badge-name">수면왕</div></div>
      <div class="badge-item locked"><div class="badge-icon">🔮</div><div class="badge-name">30일 달성</div></div>
    </div>
  </div>
</main>
<nav>
  <a href="#" class="active"><span class="icon">🌙</span>홈</a>
  <a href="#"><span class="icon">📊</span>통계</a>
  <a href="#"><span class="icon">⏰</span>알림</a>
  <a href="#"><span class="icon">🏅</span>배지</a>
</nav>
<div class="pilot-banner">파일럿 산출물 — team-4 · sleeplog | 기획/디자인: 김승연 · 기획/개발: 정주윤 · 개발: 문혜윤</div>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Eaaty</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f7fb;
    padding:30px;
    color:#333;
}

.container{
    max-width:900px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

h1{
    text-align:center;
    margin-bottom:30px;
    color:#2c3e50;
}

textarea{
    width:100%;
    height:140px;
    border:none;
    outline:none;
    padding:15px;
    border-radius:12px;
    background:#eef2f7;
    font-size:16px;
    resize:none;
    margin-bottom:20px;
}

button{
    padding:12px 18px;
    border:none;
    border-radius:10px;
    background:#3498db;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#2980b9;
}

.card{
    background:#f9fbfd;
    padding:20px;
    border-radius:15px;
    margin-bottom:20px;
}

.food-tag{
    display:inline-block;
    padding:6px 12px;
    background:#3498db;
    color:white;
    border-radius:20px;
    margin:5px;
    font-size:13px;
}

.total-kcal{
    font-size:26px;
    font-weight:bold;
    color:#e74c3c;
    margin-top:10px;
}

.bar{
    width:100%;
    height:20px;
    background:#ddd;
    border-radius:20px;
    overflow:hidden;
    margin-top:8px;
}

.fill{
    height:100%;
    transition:0.5s;
}

.carb{background:#3498db;}
.protein{background:#2ecc71;}
.fat{background:#e67e22;}

.recipe-box{
    background:white;
    padding:15px;
    border-radius:12px;
    margin-top:10px;
    border-left:5px solid #3498db;
}

</style>
</head>

<body>

<div class="container">

<h1>🍱 Eaaty</h1>

<textarea id="foodInput" placeholder="예: 아침 바나나 우유 / 점심 제육볶음 밥 / 저녁 닭가슴살 샐러드"></textarea>

<button onclick="analyze()">분석하기</button>

<div class="card">
    <h2>📊 결과</h2>

    <div id="tags"></div>

    <div class="total-kcal" id="kcal">0 kcal</div>

    <div>탄수화물</div>
    <div class="bar"><div class="fill carb" id="carbBar"></div></div>
    <div id="carbText"></div>

    <br>

    <div>단백질</div>
    <div class="bar"><div class="fill protein" id="proteinBar"></div></div>
    <div id="proteinText"></div>

    <br>

    <div>지방</div>
    <div class="bar"><div class="fill fat" id="fatBar"></div></div>
    <div id="fatText"></div>
</div>

<div class="card">
    <h2>🤖 AI 추천 식단</h2>
    <div id="recommend"></div>
</div>

</div>

<script>

const foodDB = {
    "바나나":{kcal:100,carb:27,protein:1,fat:0},
    "우유":{kcal:120,carb:10,protein:6,fat:5},
    "밥":{kcal:300,carb:65,protein:6,fat:1},
    "제육볶음":{kcal:450,carb:20,protein:30,fat:25},
    "닭가슴살":{kcal:200,carb:0,protein:35,fat:4},
    "샐러드":{kcal:80,carb:10,protein:2,fat:3},
    "달걀":{kcal:80,carb:1,protein:6,fat:5},
    "고구마":{kcal:180,carb:40,protein:3,fat:0},
    "삼겹살":{kcal:500,carb:0,protein:25,fat:42}
};

const recipes = {

"닭가슴살 파스타":{
    satisfaction:"😍 만족감 + 고단백 밸런스",
    desc:"운동 후 먹기 좋은 고단백 + 맛 균형",
    recipe:`
    <h2>🍝 닭가슴살 파스타</h2>
    <p>재료: 닭가슴살, 파스타면, 우유, 양파</p>
    <p>1. 닭가슴살 볶기</p>
    <p>2. 우유 넣고 소스 만들기</p>
    <p>3. 면 넣고 섞기</p>
    `
},

"불고기 덮밥":{
    satisfaction:"🔥 매우 높은 만족감",
    desc:"포만감 + 맛 + 에너지 모두 좋음",
    recipe:`
    <h2>🍚 불고기 덮밥</h2>
    <p>재료: 소고기, 간장, 양파, 밥</p>
    <p>1. 양념 후 볶기</p>
    <p>2. 밥 위에 올리기</p>
    `
},

"연어 샐러드":{
    satisfaction:"😊 깔끔한 만족감",
    desc:"다이어트용 가볍고 건강한 식단",
    recipe:`
    <h2>🥗 연어 샐러드</h2>
    <p>재료: 연어, 채소, 올리브오일</p>
    <p>1. 연어 굽기</p>
    <p>2. 채소와 섞기</p>
    `
}
};

function analyze(){

let input = document.getElementById("foodInput").value;

let kcal=0,carb=0,protein=0,fat=0;

let found=[];

for(let f in foodDB){
    if(input.includes(f)){
        found.push(f);
        kcal+=foodDB[f].kcal;
        carb+=foodDB[f].carb;
        protein+=foodDB[f].protein;
        fat+=foodDB[f].fat;
    }
}

document.getElementById("tags").innerHTML =
found.map(x=>`<span class="food-tag">${x}</span>`).join("");

document.getElementById("kcal").innerText = kcal+" kcal";

let cP=Math.min(carb/300*100,100);
let pP=Math.min(protein/60*100,100);
let fP=Math.min(fat/65*100,100);

document.getElementById("carbBar").style.width=cP+"%";
document.getElementById("proteinBar").style.width=pP+"%";
document.getElementById("fatBar").style.width=fP+"%";

document.getElementById("carbText").innerText=`${carb}g (${cP.toFixed(1)}%)`;
document.getElementById("proteinText").innerText=`${protein}g (${pP.toFixed(1)}%)`;
document.getElementById("fatText").innerText=`${fat}g (${fP.toFixed(1)}%)`;

let menu="";

if(protein<60) menu="닭가슴살 파스타";
else if(fat>65) menu="연어 샐러드";
else menu="불고기 덮밥";

document.getElementById("recommend").innerHTML=`
<div class="recipe-box">
<h3>${menu}</h3>
<p>${recipes[menu].desc}</p>
<p>${recipes[menu].satisfaction}</p>
<br>
<button onclick="show('${menu}')">레시피 보기</button>
</div>
`;

}

function show(menu){

document.body.innerHTML=`
<div class="container">
<button onclick="location.reload()">← 돌아가기</button>

<div class="card">
${recipes[menu].recipe}
</div>
</div>
`;

}

</script>

</body>
</html>
